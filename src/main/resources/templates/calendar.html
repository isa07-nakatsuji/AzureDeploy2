<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${monthTitle} + ' · カレンダー'">カレンダー</title>
	<link rel="stylesheet" th:href="@{/css/calendar.css}">
</head>
<body>
<header class="app-header">
	<h1 class="app-title">カレンダー</h1>
	<p class="app-subtitle">データベースなし・メモリ内の予定管理（再起動すると消えます）</p>
</header>

<main class="layout">
	<section class="panel calendar-panel">
		<div class="month-toolbar">
			<a class="btn ghost"
			   th:href="@{/calendar(year=${prevYear},month=${prevMonth})}">&laquo; 前月</a>
			<h2 class="month-title" th:text="${monthTitle}">2026年5月</h2>
			<a class="btn ghost"
			   th:href="@{/calendar(year=${nextYear},month=${nextMonth})}">翌月 &raquo;</a>
		</div>

		<div class="calendar-wrap">
			<div class="weekday-row">
				<div class="weekday" th:each="w : ${weekdayLabels}" th:text="${w}">日</div>
			</div>
			<div class="week-row" th:each="week : ${weeks}">
				<div class="day-cell"
				     th:each="cell : ${week}"
				     th:classappend="${cell.inCurrentMonth} ? '' : 'muted'"
				     th:classappend="${cell.date.equals(today)} ? 'today' : ''">
					<div class="day-head">
						<a class="day-number"
						   th:href="@{/calendar(year=${year},month=${month},selected=${cell.date})}"
						   th:text="${#temporals.day(cell.date)}">1</a>
					</div>
					<ul class="event-list">
						<li class="event-item" th:each="ev : ${cell.events}">
							<span class="event-title" th:text="${ev.title}">予定</span>
							<span class="event-meta" th:if="${ev.timeText != null and !#strings.isEmpty(ev.timeText)}"
								  th:text="${ev.timeText}">10:00</span>
							<form class="inline-delete" th:action="@{/calendar/events/delete}" method="post">
								<input type="hidden" name="id" th:value="${ev.id}">
								<input type="hidden" name="redirectYear" th:value="${year}">
								<input type="hidden" name="redirectMonth" th:value="${month}">
								<button type="submit" class="btn-icon" title="削除" aria-label="削除">&times;</button>
							</form>
						</li>
					</ul>
				</div>
			</div>
		</div>
	</section>

	<section class="panel form-panel">
		<h3>予定を追加</h3>
		<form class="event-form" th:action="@{/calendar/events}" th:object="${eventForm}" method="post">
			<input type="hidden" name="redirectYear" th:value="${year}">
			<input type="hidden" name="redirectMonth" th:value="${month}">

			<label class="field">
				<span class="label">タイトル</span>
				<input type="text" th:field="*{title}" maxlength="120" placeholder="ミーティング" autocomplete="off">
				<span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
			</label>

			<label class="field">
				<span class="label">日付</span>
				<input type="date" th:field="*{date}">
				<span class="error" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></span>
			</label>

			<label class="field">
				<span class="label">時刻（任意）</span>
				<input type="text" th:field="*{timeText}" maxlength="32" placeholder="14:00">
				<span class="error" th:if="${#fields.hasErrors('timeText')}" th:errors="*{timeText}"></span>
			</label>

			<label class="field">
				<span class="label">メモ（任意）</span>
				<textarea th:field="*{note}" rows="3" maxlength="500" placeholder="場所・リンクなど"></textarea>
				<span class="error" th:if="${#fields.hasErrors('note')}" th:errors="*{note}"></span>
			</label>

			<button type="submit" class="btn primary">追加する</button>
		</form>
	</section>
</main>
</body>
</html>
